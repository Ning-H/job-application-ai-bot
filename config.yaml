job_boards:
  - name: "LinkedIn"
    url: "https://www.linkedin.com/jobs/search/"
    requires_auth: false

# LinkedIn search terms for big tech (no public ATS API)
big_tech_linkedin:
  - company: "Google"
    query: "data engineer OR AI engineer OR machine learning engineer"
  - company: "Meta"
    query: "data engineer OR ML engineer"
  - company: "Amazon"
    query: "data engineer OR ML engineer"
  - company: "Microsoft"
    query: "data engineer OR AI engineer"
  - company: "Apple"
    query: "data engineer OR ML engineer"

crawl_settings:
  frequency_hours: 4
  max_concurrent_crawls: 5
  timeout_seconds: 30
  retry_attempts: 3

ranking_weights:
  skills_match: 0.35
  salary_fit: 0.25
  company_reputation: 0.20
  location_preference: 0.20

auto_apply_threshold: 0.6
human_review_threshold: 0.75
